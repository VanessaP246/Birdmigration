<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vogelflugrouten Weltkarte</title>
    <style> body {padding: 0; margin: 0;} </style>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet"/>
  </head>

  <body>
    <div id="gesamteSeite">
        <div id="linkeSeite">

            <!-- Kartenelement -->
            <div id="Karte"> 
                <button onclick="setStyle('custom')">🗺️ Karte</button>
<button onclick="setStyle('satellite')">🛰️ Satellit</button>

<div id="map" style="width:100%; height:100%;"></div>

<script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
<script>
  const styles = {
    custom: 'style.json',           // dein Maputnik-Export
    satellite: {
      version: 8,
      sources: {
        esri: {
          type: 'raster',
          tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
          tileSize: 256,
          attribution: '© Esri, Maxar, Earthstar Geographics'
        }
      },
      layers: [{
        id: 'satellite',
        type: 'raster',
        source: 'esri'
      }]
    }
  };

  const map = new maplibregl.Map({
    container: 'map',
    style: styles.custom,
    center: [9.7979, 48.7988],
    zoom: 13
  });

  function setStyle(name) {
    map.setStyle(styles[name]);
  }
</script>
            </div>
            <div id="timeline">
                <h2>Timeline</h2>   
            </div>
        </div>
        <div id="rechteSeite">
            <div id="speciesFilter">
                <h3>species filter</h3>
            </div>
            <div id="routeFilter">
                <h3>route filter</h3>
            </div>
            <div id="monthFilter">
                <h3>month filter</h3>
            </div>
        </div>
    </div>
  </body>
</html>
