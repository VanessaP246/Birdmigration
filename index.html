<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vogelflugrouten Weltkarte</title>
    <style> body {padding: 0; margin: 0;} </style>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

  <div class="layout">
    <div class="left-col">
      <div class="map-area" id="map-area">
        <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet"/>
        <div id="map" style="width:100%; height:100%;"></div>
        <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
        <script>
          new maplibregl.Map({
            container: 'map',    
            style: 'mapStyle_darkmode.json',            // Jason aus maputnik    
            center: [9.7979, 48.7988],      // [Längengrad, Breitengrad]    
            zoom: 0  });
        </script>
          <div class="search-bar"></div>
          <div class="legend"></div>
      </div>
      <div class="search-bar">Überschrift</div>
      <div class="year-filter"></div>
    </div>
 
    <div class="right-col">
      <div class="filter-block" id="bird-filter-block" data-label="Vogel Filter"></div>
      <div class="filter-block" data-label="Orte Filter"></div>
      <div class="filter-block" data-label="Monat Filter"></div>
    </div>
  </div>
  

  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script src="libs/p5.min.js"></script>
  <script src="libs/p5.dom.min.js"></script>
  <script src="libs/p5.sound.min.js"></script>
  <!-- <script src="MigrationRoute.js"></script> -->
  <script src="sketch.js"></script>
  <script src="birdFilter.js"></script>

</body>
</html>
