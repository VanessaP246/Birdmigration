<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vogelflugrouten Weltkarte</title>
    <style> body {padding: 0; margin: 0;} </style>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

  <div class="layout">
    <div class="left-col">
      <div class="map-area" id="map-area">
        <!-- Maputnik-Karte & Satellienkarte -->
        <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet"/>
        <!-- <div id="map" style="width:100%; height:100%;"></div> -->
         <div id="map"></div>
        <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
        <script>
          const styles = {
            custom: 'mapStyle_darkmode.json', // Maputnik-Export (Vektorkarte)
            satellite: {
              version: 8,
              sources: {
                esri: {
                  type: 'raster',
                  tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
                  tileSize: 256,
                  attribution: '© Esri, Maxar, Earthstar Geographics'
                }
              },
              layers: [{
                id: 'satellite',
                type: 'raster',
                source: 'esri'
              }]
            }
          };

          const map = new maplibregl.Map({
            container: 'map',
            style: styles.custom,
            center: [13.3777, 52.5162], // Koordinaten von Berlin
            zoom: 0
          });

          // Kartensteuerung als Buttons (Positionen: 'top-right', 'top-left', 'bottom-right', 'bottom-left')
          map.addControl(new maplibregl.NavigationControl({
          showCompass: false // Kompass zum gerade Aurichten nicht anzeigen
          }));
          
          function setStyle(name) {
            map.setStyle(styles[name]);
          }

          // Kartenrotierung mit rechtsklick + ziehen deaktivieren
          map.dragRotate.disable();
          // Kartenrotierung mit Tastatur deaktivieren
          map.keyboard.disable();
          // Kartenrotierung mit Touchgesten deaktivieren
          map.touchZoomRotate.disableRotation();
        </script>

        <div class="search-bar"></div>
        <div class="legend">
          <!-- Radio-Buttons zum Umschalten zwischen den Karten -->
          <fieldset>
            <legend>Select a map style:</legend>
            <div>
              <input type="radio" id="custom" name="map style" value="custom" checked onclick="setStyle('custom')" />                
              <label for="custom">minimalistic map</label>
            </div>
            <div>
              <input type="radio" id="satellite" name="map style" value="satellite" onclick="setStyle('satellite')" />
              <label for="satellite">satellite map</label>
            </div>
          </fieldset>
        </div>
      </div>
      <div class="search-bar">Bird Migration</div>
      <div class="year-filter"></div>
    </div>
 
    <div class="right-col">
      <div class="filter-block" id="bird-filter-block" data-label="Vogel Filter"></div>
      <div class="filter-block" data-label="Orte Filter"></div>
      <div class="filter-block" data-label="Monat Filter"></div>
    </div>
  </div>
  

  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script src="libs/p5.min.js"></script>
  <script src="libs/p5.dom.min.js"></script>
  <script src="libs/p5.sound.min.js"></script>
  <!-- <script src="MigrationRoute.js"></script> -->
  <script src="sketch.js"></script>
  <script src="birdFilter.js"></script>
  <script src="mapRoutes.js"></script>

</body>
</html>
