<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bird Migration</title>
    <style> body {padding: 0; margin: 0;} </style>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

  <div class="layout">
    <div class="left-col">
      
      <div class="map-area" id="map-area">
        <div class="heading">Bird Migration</div>
        <!-- Maputnik-Karte & Satellienkarte -->
        <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet"/>
        <!-- <div id="map" style="width:100%; height:100%;"></div> -->
         <div id="map"></div>
        <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
        <script>
          const styles = {
            custom: 'mapStyle_darkmode.json', // Maputnik-Export (Vektorkarte)
            satellite: {
              version: 8,
              sources: {
                esri: {
                  type: 'raster',
                  tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
                  tileSize: 256,
                  attribution: '© Esri, Maxar, Earthstar Geographics'
                }
              },
              layers: [{
                id: 'satellite',
                type: 'raster',
                source: 'esri'
              }]
            }
          };

          const map = new maplibregl.Map({
            container: 'map',
            style: styles.custom,
            center: [13.3777, 52.5162], // Koordinaten von Berlin
            zoom: 0
          });

          // Kartensteuerung als Buttons (Positionen: 'top-right', 'top-left', 'bottom-right', 'bottom-left')
          map.addControl(new maplibregl.NavigationControl({
          showCompass: false // Kompass zum gerade Aurichten nicht anzeigen
          }));
          
          function setStyle(name) {
            map.setStyle(styles[name]);
          }

          // Kartenrotierung mit rechtsklick + ziehen deaktivieren
          map.dragRotate.disable();
          // Kartenrotierung mit Tastatur deaktivieren
          map.keyboard.disable();
          // Kartenrotierung mit Touchgesten deaktivieren
          map.touchZoomRotate.disableRotation();

          // Karte im Fullscreen
          map.addControl(new maplibregl.FullscreenControl());

          // Warte bis die Karte geladen ist, dann füge Bird Migration Dataset zur Attribution hinzu
          map.on('load', () => {
            setTimeout(() => {
              // Finde den Attribution-Button
              const attributionButton = document.querySelector('.maplibregl-ctrl-attrib-button');
              if (attributionButton && attributionButton.parentElement) {
                // Finde oder erstelle die Attribution-Liste
                let attributionList = document.querySelector('.maplibregl-ctrl-attrib-inner');
                if (!attributionList) {
                  attributionList = attributionButton.parentElement.querySelector('.maplibregl-ctrl-attrib-inner');
                }
                
                if (attributionList) {
                  // Erstelle ein neues Element für Bird Migration Dataset
                  const datasetAttribution = document.createElement('a');
                  datasetAttribution.href = 'https://figshare.com/articles/dataset/A_global_dataset_of_directional_migration_networks_of_migratory_birds/26162269?file=48041545';
                  datasetAttribution.target = '_blank';
                  datasetAttribution.rel = 'noopener';
                  datasetAttribution.innerHTML = 'Bird Migration data set';
                  datasetAttribution.style.cssText = 'display: block; margin-top: 4px; text-align: right; font-size: 0.85rem; color: #64c8ff;';
                  
                  attributionList.appendChild(document.createElement('br'));
                  attributionList.appendChild(datasetAttribution);
                }
              }
            }, 500);
          });
        </script>

        <div class="title"></div>
        <div class="legend">
          <!-- Radio-Buttons zum Umschalten zwischen den Karten -->
          <!-- <fieldset> -->
            <!-- <legend>Select a map style:</legend> -->
             <p style="font-weight:bold;margin-bottom:4px">Map Style</p>
            <div>
              <input type="radio" class="mapStyle" name="map style" value="custom" checked onclick="setStyle('custom')" />                
              <label for="custom">minimalistic map</label>
            </div>
            <div>
              <input type="radio" class="mapStyle" name="map style" value="satellite" onclick="setStyle('satellite')" />
              <label for="satellite">satellite map</label>
            </div>
          <!-- </fieldset> -->
        </div>
      </div>
      
      <div class="year-filter"></div>
    </div>
 
    <div class="right-col">
      <div class="filter-block" id="searchBar" data-label="Suche Filter"></div>
      <div class="filter-block" id="bird-filter-block" data-label="Vogel Filter"></div>
      <div class="filter-block" data-label="Monat Filter" id="monthFilter"></div>
    </div>
  </div>
  

  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script src="libs/p5.min.js"></script>
  <script src="libs/p5.dom.min.js"></script>
  <script src="libs/p5.sound.min.js"></script>
  <!-- <script src="MigrationRoute.js"></script> -->
  <script src="sketch.js"></script>
  <script src="mapRoutes.js"></script>
  <script src="birdFilter.js"></script>
  <script src="searchBar.js"></script>
  <script src="monthFilter.js"></script>
  <script src="yearFilter.js"></script>

</body>
</html>
