<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Bird Migration – Intro</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@200;300;400&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background: #0F1115;
  font-family: 'Montserrat', sans-serif;
}

/* ── Canvas (particles) ── */
#bgCanvas { position: absolute; inset: 0; z-index: 0; }

/* ── 3D tunnel scene ── */
#scene {
  position: absolute; inset: 0;
  perspective: 700px;
  perspective-origin: 50% 50%;
  z-index: 1;
}

/* The tunnel + cards share one moving stack */
.world {
  position: absolute; inset: 0;
  transform-style: preserve-3d;
  /* Zoom through at constant speed – no easing so it feels endless */
  animation: endlessZoom 22s linear forwards;
}

@keyframes endlessZoom {
  from { transform: translateZ(0px); }
  to   { transform: translateZ(5000px); }
}

  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  border: 1px solid;
}
/* Rings at different Z depths in 3D space via translateZ on the .world */
/* We place them as flat children – the world's translateZ does the flying */

.ring-b { width: 380px;  height: 380px;  border-color: rgba(61,74,70,.42); background: transparent; }
.ring-c { width: 680px;  height: 680px;  border-color: rgba(61,74,70,.33); background: transparent; }

/* ── Google-style result cards ── */
.card {
  position: absolute;
  width: 560px;
  background: #1A1D22;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  padding: 16px 20px 18px;
  /* Cards are placed at specific top/left + translateZ so they come from depth */
  transform-origin: center center;
  box-shadow: 0 4px 32px rgba(0,0,0,0.5);
  will-change: transform;
  filter: blur(0px);
  opacity: 0.9;
}

.card-source {
  font-family: 'Roboto', sans-serif;
  font-size: 13px;
  font-weight: 400;
  color: rgba(255,255,255,0.55);
  margin-bottom: 4px;
  letter-spacing: 0.01em;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-source-dot {
  display: inline-block;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  flex-shrink: 0;
}

.card-title {
  font-family: 'Roboto', sans-serif;
  font-size: 18px;
  font-weight: 500;
  color: #398CBF;
  line-height: 1.3;
  margin-bottom: 8px;
}

.card-body {
  font-family: 'Roboto', sans-serif;
  font-size: 13px;
  font-weight: 400;
  color: rgba(255,255,255,0.45);
  line-height: 1.55;
}
.card-body strong {
  color: rgba(255,255,255,0.65);
  font-weight: 400;
}

.birdImage {
  position: absolute;
  width: 220px;
  opacity: 0.85;
  pointer-events: none;
  filter: blur(0.2px);
}

/* ── Bird silhouettes ── */
#birds { position: absolute; inset: 0; overflow: hidden; z-index: 4; pointer-events: none; }
.bird  { position: absolute; opacity: 0; }
.b1 { top: 26%; left: -120px; animation: bFly1 22s 1.5s linear forwards; }
.b2 { top: 67%; left: -90px;  animation: bFly1 22s 6.5s linear forwards; }
.b3 { top: 40%; right: -120px; animation: bFly2 22s 3.5s linear forwards; }
.b4 { top: 78%; right: -90px;  animation: bFly2 22s 9.0s linear forwards; }
@keyframes bFly1 {
  0%  { opacity:0;   left:-120px; transform:scale(.55); }
  4%  { opacity:0.5; }
  88% { opacity:0.3; left:2100px; transform:scale(1.05); }
  100%{ opacity:0;   left:2400px; }
}
@keyframes bFly2 {
  0%  { opacity:0;   right:-120px; transform:scaleX(-1) scale(.55); }
  4%  { opacity:0.5; }
  88% { opacity:0.3; right:2100px; transform:scaleX(-1) scale(1.05); }
  100%{ opacity:0;   right:2400px; }
}

/* ── Vignette ── */
#vig {
  position: absolute; inset: 0; z-index: 5; pointer-events: none;
  background: radial-gradient(ellipse at 50% 50%,
    transparent 16%, rgba(10,11,14,.52) 55%, rgba(8,9,12,.95) 100%);
}

/* ── Grain ── */
#grain {
  position: absolute; inset: 0; opacity:.032; z-index:6; pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;
  animation:gMove .07s steps(1) infinite;
}
@keyframes gMove {
  0%  { background-position:0 0; }
  25% { background-position:-18px 12px; }
  50% { background-position:10px -8px; }
  75% { background-position:-14px -18px; }
}

/* ── Title card ── */
#titleCard {
  position: absolute; inset: 0; z-index: 7; pointer-events: none;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  opacity: 0;
  animation: tShow 2.5s 17s cubic-bezier(.16,1,.3,1) forwards;
}
@keyframes tShow { from{opacity:0} to{opacity:1} }

.hrule {
  height:1px; width:0;
  background:linear-gradient(90deg,transparent,rgba(186,173,141,.65),transparent);
}
#rT { animation:rGrow 1.5s 17.8s cubic-bezier(.16,1,.3,1) forwards; margin-bottom:24px; }
#rB { animation:rGrow 1.5s 18.0s cubic-bezier(.16,1,.3,1) forwards; margin-top:24px; }
@keyframes rGrow { from{width:0;opacity:0} to{width:380px;opacity:1} }

#tMain {

  font-size:80px; letter-spacing:.04em; color:#e8e4dc;
  opacity:0; transform: scale (0.6); transform-origin: center center;
  animation: tZoom 5s 18.6s cubic-bezier(.16,1,.3,1) forwards;
  line-height:1; text-shadow:0 4px 70px rgba(10,11,14,.95);
}

@keyframes tZoom {
from { opacity: 0; transform: scale(0.6); }
to { opacity: 1; transform: scale(1); }
}

  opacity:0; transform:translateY(8px);

} */
@keyframes tUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

/* ── Fades ── */
#fadeIn  { position:absolute;inset:0;background:#0F1115;opacity:1;z-index:8;pointer-events:none;
           animation:fIn 1.6s .1s ease-out forwards; }
#fadeOut { position:absolute;inset:0;background:#0F1115;opacity:0;z-index:9;pointer-events:none;
           animation:fOut 2.0s 22s ease-in forwards; }
@keyframes fIn  { from{opacity:1} to{opacity:0} }
@keyframes fOut { from{opacity:0} to{opacity:1} }
</style>

<script>

  },
  {

    body:   "Numbers of Lapwing, Black-tailed Godwit and Eurasian Oystercatcher at an all-time low, warns NABU in Aurich – and identifies the causes behind the decline...",

  },
  {

  },
  {

  },
  {

    left:80, top:240, z:-2400
  },


  {
  source: "BBC Wildlife",
  title: "Climate change shifts migrating birds' wintering ground",
  body: "Three species of migratory duck have shifted their wintering grounds northward in response to increasing temperatures, say scientists.",
  left:200, top:520, z:-2150

  title: "The magic of migratory birds (and the science of protecting...",
  body: "A major threat for the latter is the loss of key stopover habitat, places where birds pause between different legs of their migration.",

  body: "An alarming new study reveals that the population of North American birds has dropped nearly 30% since 1970. That's almost three billion birds gone.",
  left:300, top:300, z:-650
},
{

  body: "Research shows that we've lost 3 billion birds since 1970 and the vast majority of them were migratory. Climate change is one of the biggest threats to birds ...",
  left:1400, top:450, z:-500
},
{

  body: "Learn how climate change is disrupting animal migration and breeding cycles, reshaping ecosystems, and what conservation strategies can help ...",
  left:500, top:150, z:-450
},
{
  source: "ScienceDirect.com",
  title: "The impact of extreme weather events as a consequence ...",
  body: "Weather phenomena exert a significant impact on plants and soil biota and, in turn, affect the global biogeochemical cycle and ecosystem services, such as crop ...",
  left:1200, top:700, z:-400
}
];

// Build card elements inside the world
const world = document.getElementById('world');

CARDS.forEach(c => {
  // const el = document.createElement('div');
  // el.className = 'card';
let el;

if (c.type === "image") {
  el = document.createElement('img');
  el.src = c.src;
  el.className = 'birdImage';
} else {
  el = document.createElement('div');
  el.className = 'card';
}

  // Position card in 2D on screen – cards spread across full frame
// Mittelpunkt ist 960 / 540 → wir rechnen relativ dazu
const x = c.left - 960;
const y = c.top  - 540;

el.style.left = '50%';
el.style.top  = '50%';

el.style.transform = `
  translate3d(${x}px, ${y}px, ${c.z}px)
`;

  el.innerHTML = `
    <div class="card-source">
      <span class="card-source-dot"></span>
      ${c.source}
    </div>
    <div class="card-title">${c.title}</div>
    <div class="card-body">${c.body}</div>
  `;

  el.style.transform += `
  rotateY(${-(x / 960) * 10}deg)
rotateX(${-(y / 540) * 6}deg)
`;



  world.appendChild(el);
});

// ── Particle field ─────────────────────────────────────────
const canvas = document.getElementById('bgCanvas');
const ctx    = canvas.getContext('2d');
const PAL    = ['#3D4A46','#4D5D58','#698799','#BAAD8D','#B98E83'];

function hexRgb(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}

const PTS = Array.from({length: 200}, () => {
  const a = Math.random() * Math.PI * 2;
  const r = 20 + Math.random() * 560;
  const s = 0.07 + Math.random() * 0.20;
  return {
    x: 960 + Math.cos(a)*r, y: 540 + Math.sin(a)*r,
    vx: Math.cos(a)*s, vy: Math.sin(a)*s,
    sz: 0.5 + Math.random()*1.3,
    al: 0.05 + Math.random()*0.16,
    col: PAL[Math.floor(Math.random()*PAL.length)],
    life: Math.floor(Math.random()*500),
    maxLife: 280 + Math.random()*500
  };
});

let t0 = null;
const PDUR = 24000;

function drawParticles(ts) {
  if (!t0) t0 = ts;
  const prog  = Math.min((ts - t0) / PDUR, 1);
  const accel = 1 + prog * 6;

  ctx.clearRect(0, 0, 1920, 1080);

  PTS.forEach(p => {
    p.life++;
    if (p.life > p.maxLife) {
      const a = Math.random()*Math.PI*2, r = 10 + Math.random()*70, s = 0.07 + Math.random()*0.20;
      p.x = 960 + Math.cos(a)*r; p.y = 540 + Math.sin(a)*r;
      p.vx = Math.cos(a)*s; p.vy = Math.sin(a)*s;
      p.life = 0; p.maxLife = 280 + Math.random()*500;
    }
    p.x += p.vx * accel;
    p.y += p.vy * accel;

    const lf = p.life / p.maxLife;
    const fa = lf < 0.08 ? lf/0.08 : lf > 0.82 ? (1-lf)/0.18 : 1;
    const [r,g,b] = hexRgb(p.col);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.sz * (1 + lf * 1.6), 0, Math.PI*2);
    ctx.fillStyle = `rgba(${r},${g},${b},${p.al * fa})`;
    ctx.fill();
  });

  if (ts - t0 < PDUR) requestAnimationFrame(drawParticles);
}

requestAnimationFrame(drawParticles);
</script>
